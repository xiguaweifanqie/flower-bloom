<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>点一下，就开花 🌸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  .hint {
    position: fixed;
    bottom: 80px;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .hint span {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.7);
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 15px;
    letter-spacing: 2px;
    animation: hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.5; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
  .counter {
    position: fixed;
    top: 20px;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .counter span {
    display: inline-block;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="hint"><span>🌸 轻触屏幕，花就开了</span></div>
<div class="counter"><span id="count">已开 0 朵</span></div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const countEl = document.getElementById('count');
  let W, H, flowers = [], particles = [], totalBlooms = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- 花瓣形状绘制 ----
  function petalPath(cx, cy, w, h, angle) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    // 心形花瓣
    const top = -h;
    const cpY = -h * 0.55;
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-w * 0.5, cpY, -w, -h * 0.2, 0, top);
    ctx.bezierCurveTo(w, -h * 0.2, w * 0.5, cpY, 0, 0);
    ctx.closePath();
    ctx.restore();
  }

  // ---- 花朵类 ----
  class Flower {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.petalCount = 5 + Math.floor(Math.random() * 4); // 5~8瓣
      this.petalLen = 18 + Math.random() * 22;
      this.petalWid = 7 + Math.random() * 8;
      this.angle = Math.random() * Math.PI * 2;
      this.progress = 0;     // 0→1 绽放进度
      this.speed = 0.012 + Math.random() * 0.016;
      this.life = 1;         // 存活
      this.fadeDelay = 0.6;  // 进度到多少开始淡出
      this.alpha = 1;
      // 颜色：粉色系/红色系/橙色系
      const hue = 340 + Math.random() * 40; // 340~380 (粉→红→橙)
      const sat = 60 + Math.random() * 35;
      const light = 55 + Math.random() * 25;
      this.color = `hsl(${hue}, ${sat}%, ${light}%)`;
      this.centerColor = `hsl(${45 + Math.random() * 15}, 90%, ${60 + Math.random() * 25}%)`;
      this.glowColor = `hsl(${hue}, ${sat}%, ${light + 10}%)`;
      // 每片花瓣的随机偏移
      this.petalOffsets = [];
      for (let i = 0; i < this.petalCount; i++) {
        this.petalOffsets.push({
          scale: 0.75 + Math.random() * 0.25,
          angleOff: (Math.random() - 0.5) * 0.2,
          delay: Math.random() * 0.25,
        });
      }
    }

    update() {
      if (this.life <= 0) return false;
      this.progress += this.speed;
      if (this.progress >= 1) {
        this.progress = 1;
        this.life -= 0.015;
        this.alpha = Math.max(0, this.life);
      } else if (this.progress > this.fadeDelay) {
        // 后期微弱的 alpha 下降
      }
      if (this.life <= 0 && this.progress >= 1) return false;

      // 绽放时产生粒子
      if (this.progress > 0.35 && this.progress < 0.7 && Math.random() < 0.4) {
        for (let i = 0; i < this.petalCount; i++) {
          const a = (Math.PI * 2 / this.petalCount) * i + this.angle;
          const r = this.petalLen * this.progress * 2;
          particles.push(new Particle(
            this.x + Math.cos(a) * r,
            this.y + Math.sin(a) * r,
            this.color, 1.5 + Math.random() * 2, 400 + Math.random() * 600
          ));
        }
      }
      return true;
    }

    draw(ctx) {
      const p = easeOutBack(this.progress);
      ctx.globalAlpha = this.alpha;

      // 光晕
      const glowR = this.petalLen * p * 1.3;
      const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
      glow.addColorStop(0, this.glowColor.replace('%)', '%, 0.35)').replace('hsl', 'hsla'));
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
      ctx.fill();

      // 花瓣
      for (let i = 0; i < this.petalCount; i++) {
        const off = this.petalOffsets[i];
        const petalP = Math.max(0, Math.min(1, (p - off.delay) / (1 - off.delay)));
        if (petalP <= 0) continue;
        const baseA = (Math.PI * 2 / this.petalCount) * i + this.angle + off.angleOff * petalP;
        const dist = this.petalLen * petalP * off.scale * 1.1;
        const px = this.x + Math.cos(baseA) * dist * 0.3;
        const py = this.y + Math.sin(baseA) * dist * 0.3;
        const w = this.petalWid * petalP * off.scale;
        const h = this.petalLen * petalP * off.scale;
        const fillAlpha = petalP < 0.3 ? petalP / 0.3 : 1;
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha * fillAlpha;
        petalPath(px, py, w, h, baseA);
        ctx.fill();
        // 花瓣边线
        ctx.strokeStyle = `rgba(255,255,255,${0.15 * fillAlpha * this.alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // 花蕊
      ctx.globalAlpha = this.alpha * Math.min(1, p * 2);
      const centerR = 4 + p * 8;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, centerR);
      grad.addColorStop(0, '#fffde7');
      grad.addColorStop(0.4, this.centerColor);
      grad.addColorStop(1, this.color.replace('55%', '35%'));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, centerR, 0, Math.PI * 2);
      ctx.fill();
      // 花蕊小点
      for (let i = 0; i < 6; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = centerR * 0.55 * Math.random();
        ctx.fillStyle = `rgba(255,255,200,${0.7 * this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x + Math.cos(a) * r, this.y + Math.sin(a) * r, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
    }
  }

  // ---- 飘落粒子 ----
  class Particle {
    constructor(x, y, color, size, life) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 1.2;
      this.vy = -1.5 - Math.random() * 2.5;
      this.color = color;
      this.size = size;
      this.life = life;
      this.maxLife = life;
      this.rot = Math.random() * Math.PI * 2;
      this.rotV = (Math.random() - 0.5) * 0.1;
    }
    update() {
      this.life--;
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.012; // 微弱重力
      this.rot += this.rotV;
      this.alpha = Math.max(0, this.life / this.maxLife);
      return this.life > 0;
    }
    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      // 小椭圆花瓣
      ctx.ellipse(0, 0, this.size, this.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ---- 背景星光 ----
  let stars = [];
  function initStars() {
    stars = [];
    for (let i = 0; i < 50; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.5 + Math.random() * 1.5,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.01 + Math.random() * 0.03,
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  function drawStars() {
    for (const s of stars) {
      s.twinkle += s.speed;
      const alpha = 0.2 + Math.sin(s.twinkle) * 0.2;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ---- easeOutBack ----
  function easeOutBack(t) {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  // ---- 点击处理 ----
  function bloom(x, y) {
    flowers.push(new Flower(x, y));
    // 有时双花
    if (Math.random() < 0.3) {
      setTimeout(() => {
        const ox = x + (Math.random() - 0.5) * 50;
        const oy = y + (Math.random() - 0.5) * 50;
        flowers.push(new Flower(ox, oy));
        totalBlooms++;
        countEl.textContent = '已开 ' + totalBlooms + ' 朵';
      }, 120 + Math.random() * 200);
    }
    totalBlooms++;
    countEl.textContent = '已开 ' + totalBlooms + ' 朵';
  }

  // 触摸事件（移动端）
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      bloom(t.clientX, t.clientY);
    }
  }, { passive: false });

  // 点击事件（PC端）
  canvas.addEventListener('click', function(e) {
    bloom(e.clientX, e.clientY);
  });

  // ---- 动画循环 ----
  function animate() {
    ctx.clearRect(0, 0, W, H);

    // 背景渐变
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#1a1a2e');
    bg.addColorStop(0.5, '#16213e');
    bg.addColorStop(1, '#0f3460');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    drawStars();

    // 更新花朵
    flowers = flowers.filter(f => {
      const alive = f.update();
      f.draw(ctx);
      return alive;
    });

    // 更新粒子
    particles = particles.filter(p => {
      const alive = p.update();
      p.draw(ctx);
      return alive;
    });

    requestAnimationFrame(animate);
  }

  animate();

  // 3秒后淡化提示
  setTimeout(() => {
    const hint = document.querySelector('.hint span');
    if (hint) hint.style.animationPlayState = 'paused';
  }, 8000);

})();
</script>
</body>
</html>
